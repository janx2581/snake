<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }
    h1 { margin-bottom: 10px; font-size: 2rem; letter-spacing: 3px; color: #fff; }
    #score-board {
      display: flex;
      gap: 40px;
      margin-bottom: 12px;
      font-size: 1.1rem;
    }
    #score-board span { color: #aaa; }
    #score-board b { color: #fff; }
    canvas {
      border: 3px solid #fff;
      border-radius: 6px;
      background: #111;
      box-shadow: 0 0 30px rgba(255,255,255,0.15);
    }
    #overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    #overlay h2 { font-size: 2.5rem; color: #fff; }
    #overlay p { color: #aaa; font-size: 1.1rem; }
    button {
      padding: 12px 32px;
      font-size: 1rem;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s;
    }
    button:hover { background: #ccc; }
    #controls { margin-top: 12px; font-size: 0.85rem; color: #555; }
  </style>
</head>
<body>
  <h1>🐍 SNAKE</h1>
  <div id="score-board">
    <div><span>SCORE </span><b id="score">0</b></div>
    <div><span>HIGH SCORE </span><b id="highscore">0</b></div>
  </div>
  <div style="position:relative;">
    <canvas id="canvas" width="500" height="500"></canvas>
    <div id="overlay">
      <h2 id="overlay-title">SNAKE</h2>
      <p id="overlay-msg">Brug babytasterne til at styre</p>
      <button id="start-btn">START SPIL</button>
    </div>
  </div>
  <div id="controls">↑ ↓ ← → &nbsp;|&nbsp; P = Pause</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const COLS = 20, ROWS = 20;
    const CELL = canvas.width / COLS;

    let snake, dir, nextDir, food, score, highScore = 0, gameLoop, paused, gameOver;

    const headImg = new Image();
    headImg.onload = () => { if (!gameOver && !paused) draw(); };
    headImg.src = 'Screenshot 2026-03-25 at 19.19.39.png';

    function init() {
      snake = [
        { x: 10, y: 10 },
        { x: 9,  y: 10 },
        { x: 8,  y: 10 },
      ];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      paused = false;
      gameOver = false;
      updateScore();
      placeFood();
    }

    function placeFood() {
      let pos;
      do {
        pos = {
          x: Math.floor(Math.random() * COLS),
          y: Math.floor(Math.random() * ROWS)
        };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    function updateScore() {
      document.getElementById('score').textContent = score;
      document.getElementById('highscore').textContent = highScore;
    }

    function step() {
      dir = { ...nextDir };
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // Wall collision
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
        endGame(); return;
      }
      // Self collision
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        endGame(); return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        if (score > highScore) highScore = score;
        updateScore();
        placeFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Grid
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke();
      }

      // Food (pulsing apple)
      const pulse = 0.8 + 0.2 * Math.sin(Date.now() / 200);
      ctx.save();
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 15;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      const fx = food.x * CELL + CELL / 2;
      const fy = food.y * CELL + CELL / 2;
      ctx.arc(fx, fy, (CELL / 2 - 2) * pulse, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      // Snake body
      for (let i = snake.length - 1; i >= 1; i--) {
        const t = 1 - (i / snake.length) * 0.6;
        ctx.fillStyle = `rgba(255, 255, 255, ${t})`;
        ctx.strokeStyle = 'rgba(0,0,0,0.4)';
        ctx.lineWidth = 1;
        const r = 4;
        const bx = snake[i].x * CELL + 1;
        const by = snake[i].y * CELL + 1;
        const bw = CELL - 2;
        const bh = CELL - 2;
        ctx.beginPath();
        ctx.roundRect(bx, by, bw, bh, r);
        ctx.fill();
        ctx.stroke();
      }

      // Snake head (image)
      const hx = snake[0].x * CELL;
      const hy = snake[0].y * CELL;
      ctx.save();
      ctx.translate(hx + CELL / 2, hy + CELL / 2);

      // Rotate head based on direction
      const angle = Math.atan2(dir.y, dir.x);
      ctx.rotate(angle);

      // Clip to circle
      ctx.beginPath();
      ctx.arc(0, 0, CELL / 2 - 1, 0, Math.PI * 2);
      ctx.clip();

      if (headImg.complete && headImg.naturalWidth > 0) {
        // Draw image centered, cropped to square
        const size = CELL - 2;
        ctx.drawImage(headImg, -size / 2, -size / 2, size, size);
      } else {
        ctx.fillStyle = '#fff';
        ctx.fill();
      }
      ctx.restore();

      // Head border
      ctx.beginPath();
      ctx.arc(hx + CELL / 2, hy + CELL / 2, CELL / 2 - 1, 0, Math.PI * 2);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    function endGame() {
      clearInterval(gameLoop);
      gameOver = true;
      if (score > highScore) highScore = score;
      updateScore();
      const overlay = document.getElementById('overlay');
      document.getElementById('overlay-title').textContent = 'GAME OVER';
      document.getElementById('overlay-msg').textContent = `Score: ${score}`;
      document.getElementById('start-btn').textContent = 'SPIL IGEN';
      overlay.style.display = 'flex';
    }

    function startGame() {
      document.getElementById('overlay').style.display = 'none';
      init();
      clearInterval(gameLoop);
      gameLoop = setInterval(step, 120);
    }

    document.getElementById('start-btn').addEventListener('click', startGame);

    document.addEventListener('keydown', e => {
      switch (e.key) {
        case 'ArrowUp':    if (dir.y !== 1)  nextDir = { x: 0, y: -1 }; e.preventDefault(); break;
        case 'ArrowDown':  if (dir.y !== -1) nextDir = { x: 0, y: 1 };  e.preventDefault(); break;
        case 'ArrowLeft':  if (dir.x !== 1)  nextDir = { x: -1, y: 0 }; e.preventDefault(); break;
        case 'ArrowRight': if (dir.x !== -1) nextDir = { x: 1, y: 0 };  e.preventDefault(); break;
        case 'p': case 'P':
          if (gameOver) return;
          paused = !paused;
          if (paused) clearInterval(gameLoop);
          else gameLoop = setInterval(step, 120);
          break;
      }
    });
  </script>
</body>
</html>
